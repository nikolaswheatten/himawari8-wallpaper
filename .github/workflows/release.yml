name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build
        run: go build -ldflags="-s -w" -o himawari8.exe ./cmd/himawari8

      - name: Checksum
        shell: pwsh
        run: |
          $hash = (Get-FileHash -Algorithm SHA256 himawari8.exe).Hash.ToLower()
          "$hash  himawari8.exe" | Out-File -Encoding ascii checksums.txt

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            himawari8.exe
            checksums.txt
          generate_release_notes: true
